name: souzip CI/CD

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop

env:
  IMAGE_NAME: souzip.kr.ncr.ntruss.com/souzip/souzip-api:latest

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew clean build -Dspring.profiles.active=test --no-build-cache

      - name: Upload JAR
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 1

  docker-build:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs/

      - name: NCP Container Registry Login
        run: |
          echo ${{ secrets.NCP_SECRET_KEY }} | docker login souzip.kr.ncr.ntruss.com \
            -u ${{ secrets.NCP_ACCESS_KEY }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.IMAGE_NAME }} .

      - name: Push Docker Image
        run: |
          docker push ${{ env.IMAGE_NAME }}

  deploy:
    needs: docker-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Copy deploy scripts to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.NCP_SERVER_HOST }}
          username: ${{ secrets.NCP_SERVER_USER }}
          key: ${{ secrets.NCP_SERVER_SSH_KEY }}
          source: "deploy/*"
          target: "/home/ubuntu/souzip"

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.NCP_SERVER_HOST }}
          username: ${{ secrets.NCP_SERVER_USER }}
          key: ${{ secrets.NCP_SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/souzip

            chmod +x deploy/scripts/*.sh
            chmod +x deploy/notification/*.sh

            cat > deploy/.env << 'EOF'
            SPRING_PROFILES_ACTIVE=dev
            DEV_DB_URL=${{ secrets.DEV_DB_URL }}
            POSTGRES_USER=${{ secrets.DEV_DB_USERNAME }}
            POSTGRES_PASSWORD=${{ secrets.DEV_DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NCP_ENDPOINT=${{ secrets.NCP_ENDPOINT }}
            NCP_REGION=${{ secrets.NCP_REGION }}
            NCP_BUCKET=${{ secrets.NCP_BUCKET }}
            NCP_ACCESS_KEY=${{ secrets.NCP_ACCESS_KEY }}
            NCP_SECRET_KEY=${{ secrets.NCP_SECRET_KEY }}
            GEOCODING_API_KEY=${{ secrets.GEOCODING_API_KEY }}
            CLOVA_STUDIO_API_KEY=${{ secrets.CLOVA_STUDIO_API_KEY }}
            CLOVA_STUDIO_API_URL=${{ secrets.CLOVA_STUDIO_API_URL }}
            DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
            DEVELOP_DISCORD_WEBHOOK_URL=${{ secrets.DEVELOP_DISCORD_WEBHOOK_URL }}
            API_DOCS_URL=https:${{ secrets.API_DOCS_URL }}
            EOF

            echo "DEPLOYER=${{ github.actor }}" >> deploy/.env
            echo "COMMIT_MESSAGE=$(echo '${{ github.event.head_commit.message }}' | head -1 | sed 's/"/\\"/g')" >> deploy/.env

            chmod 600 deploy/.env

            docker login souzip.kr.ncr.ntruss.com \
              -u ${{ secrets.NCP_ACCESS_KEY }} \
              -p ${{ secrets.NCP_SECRET_KEY }}

            ./deploy/scripts/deploy.sh
