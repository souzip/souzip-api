name: souzip CI/CD

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop

env:
  IMAGE_NAME: souzip.kr.ncr.ntruss.com/souzip/souzip-api:latest

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v3
        with:
          arguments: clean build -Dspring.profiles.active=test --no-build-cache

      - name: Upload JAR
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v3
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 1

  docker-build:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download JAR
        uses: actions/download-artifact@v3
        with:
          name: app-jar
          path: build/libs/

      - name: NCP Container Registry Login
        run: |
          echo ${{ secrets.NCP_SECRET_KEY }} | docker login souzip.kr.ncr.ntruss.com \
            -u ${{ secrets.NCP_ACCESS_KEY }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.IMAGE_NAME }} .

      - name: Push Docker Image
        run: |
          docker push ${{ env.IMAGE_NAME }}

  deploy:
    needs: docker-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.NCP_SERVER_HOST }}
          username: ${{ secrets.NCP_SERVER_USER }}
          key: ${{ secrets.NCP_SERVER_SSH_KEY }}
          script: |
            docker login souzip.kr.ncr.ntruss.com \
              -u ${{ secrets.NCP_ACCESS_KEY }} \
              -p ${{ secrets.NCP_SECRET_KEY }}
            
            docker pull ${{ env.IMAGE_NAME }}
            
            docker rm -f souzip-api || true
            
            docker run -d \
              --name souzip-api \
              --restart always \
              --network souzip-network \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=dev \
              -e DEV_DB_URL=${{ secrets.DEV_DB_URL }} \
              -e POSTGRES_USER=${{ secrets.DEV_DB_USERNAME }} \
              -e POSTGRES_PASSWORD=${{ secrets.DEV_DB_PASSWORD }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e NCP_ENDPOINT=${{ secrets.NCP_ENDPOINT }} \
              -e NCP_REGION=${{ secrets.NCP_REGION }} \
              -e NCP_BUCKET=${{ secrets.NCP_BUCKET }} \
              -e NCP_ACCESS_KEY=${{ secrets.NCP_ACCESS_KEY }} \
              -e NCP_SECRET_KEY=${{ secrets.NCP_SECRET_KEY }} \
              -e GEOCODING_API_KEY=${{ secrets.GEOCODING_API_KEY }} \
              -e CLOVA_STUDIO_API_KEY=${{ secrets.CLOVA_STUDIO_API_KEY }} \
              -e CLOVA_STUDIO_API_URL=${{ secrets.CLOVA_STUDIO_API_URL }} \
              ${{ env.IMAGE_NAME }}
            
            docker ps | grep souzip-api
