name: souzip CI/CD

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop

env:
  IMAGE_NAME: souzip.kr.ncr.ntruss.com/souzip/souzip-api:latest

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew clean build -Dspring.profiles.active=test --no-build-cache

      - name: Upload JAR
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 1

  docker-build:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs/

      - name: NCP Container Registry Login
        run: |
          echo ${{ secrets.NCP_SECRET_KEY }} | docker login souzip.kr.ncr.ntruss.com \
            -u ${{ secrets.NCP_ACCESS_KEY }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.IMAGE_NAME }} .

      - name: Push Docker Image
        run: |
          docker push ${{ env.IMAGE_NAME }}

  deploy:
    needs: docker-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Copy deploy scripts to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.NCP_SERVER_HOST }}
          username: ${{ secrets.NCP_SERVER_USER }}
          key: ${{ secrets.NCP_SERVER_SSH_KEY }}
          source: "deploy/scripts/*"
          target: "/home/ubuntu/souzip"

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.NCP_SERVER_HOST }}
          username: ${{ secrets.NCP_SERVER_USER }}
          key: ${{ secrets.NCP_SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/souzip
            
            chmod +x deploy/scripts/*.sh
            
            docker login souzip.kr.ncr.ntruss.com \
              -u ${{ secrets.NCP_ACCESS_KEY }} \
              -p ${{ secrets.NCP_SECRET_KEY }}
            
            export SPRING_PROFILES_ACTIVE=dev
            export DEV_DB_URL="${{ secrets.DEV_DB_URL }}"
            export POSTGRES_USER="${{ secrets.DEV_DB_USERNAME }}"
            export POSTGRES_PASSWORD="${{ secrets.DEV_DB_PASSWORD }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export NCP_ENDPOINT="${{ secrets.NCP_ENDPOINT }}"
            export NCP_REGION="${{ secrets.NCP_REGION }}"
            export NCP_BUCKET="${{ secrets.NCP_BUCKET }}"
            export NCP_ACCESS_KEY="${{ secrets.NCP_ACCESS_KEY }}"
            export NCP_SECRET_KEY="${{ secrets.NCP_SECRET_KEY }}"
            export GEOCODING_API_KEY="${{ secrets.GEOCODING_API_KEY }}"
            export CLOVA_STUDIO_API_KEY="${{ secrets.CLOVA_STUDIO_API_KEY }}"
            export CLOVA_STUDIO_API_URL="${{ secrets.CLOVA_STUDIO_API_URL }}"
            
            ./deploy/scripts/deploy.sh
