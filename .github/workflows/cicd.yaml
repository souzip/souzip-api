name: souzip CI/CD

on:
  pull_request:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v3
        with:
          arguments: clean build -Dspring.profiles.active=test --no-build-cache

      - name: NCP Container Registry Login
        run: |
          echo ${{ secrets.NCP_SECRET_KEY }} | docker login souzip.kr.ncr.ntruss.com -u ${{ secrets.NCP_ACCESS_KEY }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t souzip.kr.ncr.ntruss.com/souzip/souzip-api:latest .

      - name: Push Docker Image
        run: |
          docker push souzip.kr.ncr.ntruss.com/souzip/souzip-api:latest

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.NCP_SERVER_HOST }}
          username: ${{ secrets.NCP_SERVER_USER }}
          key: ${{ secrets.NCP_SERVER_SSH_KEY }}
          script: |
            docker login souzip.kr.ncr.ntruss.com -u ${{ secrets.NCP_ACCESS_KEY }} -p ${{ secrets.NCP_SECRET_KEY }}
            docker pull souzip.kr.ncr.ntruss.com/souzip/souzip-api:latest
            docker rm -f souzip-api || true
            docker run -d \
              --name souzip-api \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=dev \
              -e DB_URL=${{ secrets.DEV_DB_URL }} \
              -e POSTGRES_USER=${{ secrets.DEV_DB_USERNAME }} \
              -e POSTGRES_PASSWORD=${{ secrets.DEV_DB_PASSWORD }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              souzip.kr.ncr.ntruss.com/souzip/souzip-api:latest