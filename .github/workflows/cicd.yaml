name: souzip CI/CD

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v3
        with:
          arguments: build

      - name: NCP Container Registry Login
        run: |
          echo ${{ secrets.NCP_SECRET_KEY }} | docker login registry.<region>.ndocker.io -u ${{ secrets.NCP_ACCESS_KEY }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t registry.<region>.ndocker.io/<namespace>/<repository>:${GITHUB_SHA} .

      - name: Push Docker Image
        run: |
          docker push registry.<region>.ndocker.io/<namespace>/<repository>:${GITHUB_SHA}

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker login registry.<region>.ndocker.io -u ${{ secrets.NCP_ACCESS_KEY }} -p ${{ secrets.NCP_SECRET_KEY }}
            docker pull registry.<region>.ndocker.io/<namespace>/<repository>:${GITHUB_SHA}
            docker stop souzip || true
            docker rm souzip || true
            docker run -d --name souzip -p 8080:8080 registry.<region>.ndocker.io/<namespace>/<repository>:${GITHUB_SHA}
