name: develop

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop

env:
  IMAGE_NAME: asia-northeast3-docker.pkg.dev/souzip-488211/souzip-dev-repo/souzip-api:latest

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew clean build -Dspring.profiles.active=test --no-build-cache

      - name: Upload JAR
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 1

  docker-build:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs/

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker asia-northeast3-docker.pkg.dev

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME .

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME

  deploy:
    needs: docker-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    environment:
      name: Development
      url: https://api-dev.souzip.com

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Copy deploy scripts to GCP dev server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.GCP_DEV_HOST }}
          username: ${{ secrets.GCP_DEV_USER }}
          key: ${{ secrets.GCP_DEV_SSH_KEY }}
          source: "deploy/*"
          target: "/home/${{ secrets.GCP_DEV_USER }}/souzip"

      - name: Deploy to dev server
        uses: appleboy/ssh-action@v0.1.6
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        with:
          host: ${{ secrets.GCP_DEV_HOST }}
          username: ${{ secrets.GCP_DEV_USER }}
          key: ${{ secrets.GCP_DEV_SSH_KEY }}
          envs: COMMIT_MSG
          script: |
            cd /home/${{ secrets.GCP_DEV_USER }}/souzip

            chmod +x deploy/dev/scripts/*.sh
            chmod +x deploy/shared/*.sh

            cat > deploy/dev/.env << 'EOF'
            SPRING_PROFILES_ACTIVE=dev
            DEV_DB_URL=${{ secrets.DEV_DB_URL }}
            DEV_POSTGRES_USER=${{ secrets.DEV_DB_USERNAME }}
            DEV_POSTGRES_PASSWORD=${{ secrets.DEV_DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NCP_ENDPOINT=${{ secrets.NCP_ENDPOINT }}
            NCP_REGION=${{ secrets.NCP_REGION }}
            NCP_BUCKET=${{ secrets.NCP_BUCKET }}
            NCP_ACCESS_KEY=${{ secrets.NCP_ACCESS_KEY }}
            NCP_SECRET_KEY=${{ secrets.NCP_SECRET_KEY }}
            GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
            CLOVA_STUDIO_API_KEY=${{ secrets.CLOVA_STUDIO_API_KEY }}
            CLOVA_STUDIO_API_URL=${{ secrets.CLOVA_STUDIO_API_URL }}
            DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
            DEVELOP_DISCORD_WEBHOOK_URL=${{ secrets.DEVELOP_DISCORD_WEBHOOK_URL }}
            DEV_API_DOCS_URL=${{ secrets.DEV_API_DOCS_URL }}
            ADMIN_INITIAL_USERNAME=${{ secrets.ADMIN_INITIAL_USERNAME }}
            ADMIN_INITIAL_PASSWORD=${{ secrets.ADMIN_INITIAL_PASSWORD }}
            GRAFANA_ADMIN_USER=${{ secrets.DEV_GRAFANA_ADMIN_USER }}
            GRAFANA_ADMIN_PASSWORD=${{ secrets.DEV_GRAFANA_ADMIN_PASSWORD }}
            FIREBASE_ENABLED=${{ secrets.FIREBASE_ENABLED }}
            FIREBASE_CREDENTIALS_PATH=${{ secrets.DEV_FIREBASE_CREDENTIALS_PATH }}
            EOF

            echo "DEPLOYER=${{ github.actor }}" >> deploy/dev/.env
            printf 'COMMIT_MESSAGE=%s\n' "$(echo "$COMMIT_MSG" | head -1)" >> deploy/dev/.env

            chmod 600 deploy/dev/.env

            gcloud auth configure-docker asia-northeast3-docker.pkg.dev

            ./deploy/dev/scripts/deploy.sh
