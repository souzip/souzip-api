name: prod

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  IMAGE_NAME: asia-northeast3-docker.pkg.dev/souzip-488211/souzip-prod-repo/souzip-api:latest

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew clean build -Dspring.profiles.active=test --no-build-cache

      - name: Upload JAR
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  docker-build:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs/

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker
        run: |
          gcloud auth configure-docker asia-northeast3-docker.pkg.dev

      - name: Build Image
        run: |
          docker build -t $IMAGE_NAME .

      - name: Push Image
        run: |
          docker push $IMAGE_NAME

  deploy:
    needs: docker-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Copy deploy scripts to GCP server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.GCP_PROD_HOST }}
          username: ${{ secrets.GCP_PROD_USER }}
          key: ${{ secrets.GCP_PROD_SSH_KEY }}
          source: "deploy/*"
          target: "/home/${{ secrets.GCP_PROD_USER }}/souzip"

      - name: Deploy to GCP Server
        uses: appleboy/ssh-action@v0.1.6
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        with:
          host: ${{ secrets.GCP_PROD_HOST }}
          username: ${{ secrets.GCP_PROD_USER }}
          key: ${{ secrets.GCP_PROD_SSH_KEY }}
          envs: COMMIT_MSG
          script: |
            cd /home/${{ secrets.GCP_PROD_USER }}/souzip

            chmod +x deploy/prod/scripts/*.sh
            chmod +x deploy/shared/*.sh

            cat > deploy/prod/.env << 'EOF'
            SPRING_PROFILES_ACTIVE=prod
            PROD_DB_URL=${{ secrets.PROD_DB_URL }}
            PROD_POSTGRES_USER=${{ secrets.PROD_DB_USERNAME }}
            PROD_POSTGRES_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
            CLOVA_STUDIO_API_KEY=${{ secrets.CLOVA_STUDIO_API_KEY }}
            CLOVA_STUDIO_API_URL=${{ secrets.CLOVA_STUDIO_API_URL }}
            DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
            PROD_DISCORD_WEBHOOK_URL=${{ secrets.PROD_DISCORD_WEBHOOK_URL }}
            PROD_API_DOCS_URL=${{ secrets.PROD_API_DOCS_URL }}
            ADMIN_INITIAL_USERNAME=${{ secrets.ADMIN_INITIAL_USERNAME }}
            ADMIN_INITIAL_PASSWORD=${{ secrets.ADMIN_INITIAL_PASSWORD }}
            NCP_ENDPOINT=${{ secrets.NCP_ENDPOINT }}
            NCP_REGION=${{ secrets.NCP_REGION }}
            NCP_BUCKET=${{ secrets.NCP_BUCKET }}
            NCP_ACCESS_KEY=${{ secrets.NCP_ACCESS_KEY }}
            NCP_SECRET_KEY=${{ secrets.NCP_SECRET_KEY }}
            EOF

            echo "DEPLOYER=${{ github.actor }}" >> deploy/prod/.env
            printf 'COMMIT_MESSAGE=%s\n' "$(echo "$COMMIT_MSG" | head -1)" >> deploy/prod/.env

            chmod 600 deploy/prod/.env

            gcloud auth configure-docker asia-northeast3-docker.pkg.dev

            ./deploy/prod/scripts/deploy.sh