version: "3.8"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: souzip-dev-db
    restart: always
    networks:
      - souzip-network
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: souzip_dev
      POSTGRES_USER: ${DEV_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DEV_POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEV_POSTGRES_USER} -d souzip_dev"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  souzip-network:
    external: true

volumes:
  postgres-data:
    driver: local
