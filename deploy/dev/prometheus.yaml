global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'souzip-api-dev'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['souzip-api:8080']
        labels:
          application: 'souzip-api'
          environment: 'dev'
