version: '3.8'

services:
  loki:
    image: grafana/loki:latest
    container_name: souzip-loki-prod
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - loki-data:/loki
      - ./loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - souzip-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: souzip-promtail-prod
    volumes:
      - /home/souzip-prod/logs:/logs:ro
      - ./promtail.yaml:/etc/promtail/config.yaml:ro
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - souzip-network
    restart: unless-stopped
    depends_on:
      - loki

networks:
  souzip-network:
    external: true

volumes:
  loki-data:
