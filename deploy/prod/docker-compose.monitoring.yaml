version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: souzip-prometheus-prod
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus-prod.yaml:/etc/prometheus/prometheus.yaml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--storage.tsdb.retention.time=90d'
    networks:
      - souzip-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: souzip-grafana-prod
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - souzip-network
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  souzip-network:
    external: true

volumes:
  prometheus-data:
  grafana-data:
