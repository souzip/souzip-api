global:
  scrape_interval: 60s
  evaluation_interval: 60s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'souzip-api-blue'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['souzip-api-blue:8080']
        labels:
          application: 'souzip-api'
          environment: 'prod'
          deployment: 'blue'

  - job_name: 'souzip-api-green'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['souzip-api-green:8080']
        labels:
          application: 'souzip-api'
          environment: 'prod'
          deployment: 'green'
