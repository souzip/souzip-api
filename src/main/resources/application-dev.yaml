spring:
  docker:
    compose:
      enabled: false

  datasource:
    url: ${DEV_DB_URL}
    username: ${DEV_POSTGRES_USER}
    password: ${DEV_POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

jwt:
  secret: ${JWT_SECRET}

cors:
  allowed-origins:
    - http://localhost:5173
    - https://admin-dev.souzip.com
    - https://admin.souzip.com

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: dev
    distribution:
      percentiles-histogram:
        http.server.requests: true
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  config: classpath:logback-dev.xml
