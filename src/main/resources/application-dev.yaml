spring:
  datasource:
    url: ${DEV_DB_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  flyway:
    enabled: true
    baseline-on-migrate: true

  elasticsearch:
    uris: http://souzip-elasticsearch:9200

jwt:
  secret: ${JWT_SECRET}

cors:
  allowed-origins:
    - https://admin-dev.souzip.com

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: when-authorized
